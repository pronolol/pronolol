# ===============================
# Infrastructure-only Compose
# ===============================
# Runs Postgres + migrations locally so app services can connect via localhost.
#
# Usage:
#   npm run dev:db          # start Postgres + auto-migrate
#   npm run dev:db:down     # stop and remove containers
#   docker compose -f compose.infra.yml --profile tools up  # + pgAdmin

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-pronolol}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-pronolol}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: packages/database/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@db:5432/pronolol?sslmode=disable}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  pgadmin:
    profiles: ["tools"]
    image: dpage/pgadmin4:8
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
