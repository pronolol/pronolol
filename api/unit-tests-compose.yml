services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-pronolol}
    volumes:
      - ../database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-user} -d $${POSTGRES_DB:-pronolol}",
        ]
      interval: 1s
      timeout: 1s
      retries: 20
    logging:
      driver: none

  api-tests:
    build: .
    command: npm test
    depends_on:
      db:
        condition: service_started
    environment:
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: ${POSTGRES_USER:-user}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-password}
      PG_DATABASE: ${POSTGRES_DB:-pronolol}
