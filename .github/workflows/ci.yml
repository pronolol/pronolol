name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build database package
        working-directory: packages/database
        run: npx prisma generate && npm run build

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Build scraper
        working-directory: apps/scraper
        run: npm run build

      - name: Lint mobile
        working-directory: apps/mobile
        run: npm run lint
