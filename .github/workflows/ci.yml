name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        working-directory: apps/api
        run: npm run build

      - name: Test
        working-directory: apps/api
        run: npm test -- --coverage

      - name: Upload API coverage
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage/lcov.info

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate OpenAPI spec
        working-directory: apps/api
        run: npm run generate:openapi

      - name: Generate API types
        working-directory: apps/web
        run: npm run generate:api

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Test
        working-directory: apps/web
        run: npm test -- --coverage

      - name: Build
        working-directory: apps/web
        run: npm run build
        env:
          VITE_API_URL: https://api.pronolol.fr

      - name: Upload Web coverage
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage/lcov.info

  scraper:
    name: Scraper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        working-directory: apps/scraper
        run: npm run build

      - name: Test
        working-directory: apps/scraper
        run: npm test -- --coverage

      - name: Upload Scraper coverage
        uses: actions/upload-artifact@v4
        with:
          name: scraper-coverage
          path: apps/scraper/coverage/lcov.info

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        working-directory: apps/mobile
        run: npm run lint

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [api, web, scraper]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download API coverage
        uses: actions/download-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage

      - name: Download Web coverage
        uses: actions/download-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage

      - name: Download Scraper coverage
        uses: actions/download-artifact@v4
        with:
          name: scraper-coverage
          path: apps/scraper/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
