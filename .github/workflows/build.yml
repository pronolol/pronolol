name: Build

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/scraper/**"
      - "packages/**"
      - "compose.yml"
      - "compose.prod.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set registry (lowercase)
        run: echo "REGISTRY=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: |
          docker compose -f compose.yml -f compose.prod.yml build api scraper
          docker compose build migrator
          docker compose push api scraper migrator
        env:
          REGISTRY: ${{ env.REGISTRY }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
