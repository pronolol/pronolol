services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-pronolol}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose port 5432 to the host machine for local debugging.
      # You may want to remove this in a production environment for security.
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-user} -d $${POSTGRES_DB:-pronolol}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: packages/database/Dockerfile
    environment:
      PG_USER: ${POSTGRES_USER:-user}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-password}
      PG_DATABASE: ${POSTGRES_DB:-pronolol}
      PG_HOST: db
      PG_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-pronolol}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: ${POSTGRES_USER:-user}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-password}
      PG_DATABASE: ${POSTGRES_DB:-pronolol}
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-pronolol}?sslmode=disable
      NODE_ENV: production
      PORT: 3000
    depends_on:
      migrator:
        condition: service_completed_successfully

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    environment:
      PG_USER: ${POSTGRES_USER:-user}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-password}
      PG_DATABASE: ${POSTGRES_DB:-pronolol}
      PG_HOST: db
      PG_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-pronolol}?sslmode=disable
    depends_on:
      migrator:
        condition: service_completed_successfully

volumes:
  postgres_data:
    driver: local
