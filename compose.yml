# ===============================
# Pronolol Docker Compose
# ===============================
#
# Usage:
#   Production:   docker compose up -d
#   Development:  docker compose -f compose.yml -f compose.dev.yml up
#   Build all:    docker compose build
#   View logs:    docker compose logs -f [service]
#
# Services:
#   - db:       PostgreSQL database
#   - migrator: Runs Prisma migrations (one-shot)
#   - api:      Express API server
#   - scraper:  Playwright web scraper

services:
  # ===============================
  # PostgreSQL Database
  # ===============================
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-pronolol}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-pronolol}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pronolol-network

  # ===============================
  # Database Migrator (one-shot)
  # ===============================
  migrator:
    image: ${REGISTRY}/pronolol-migrator:${TAG:-latest}
    build:
      context: .
      dockerfile: packages/database/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-pronolol}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pronolol-network
    # Exit after migration completes
    restart: "no"

  # ===============================
  # API Server
  # ===============================
  api:
    image: ${REGISTRY}/pronolol-api:${TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-pronolol}?sslmode=disable
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-in-production}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
    depends_on:
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - pronolol-network

  # ===============================
  # Web Scraper
  # ===============================
  scraper:
    image: ${REGISTRY}/pronolol-scraper:${TAG:-latest}
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-pronolol}?sslmode=disable
      UPTIME_KUMA_PUSH_URL: ${UPTIME_KUMA_PUSH_URL:-}
    depends_on:
      migrator:
        condition: service_completed_successfully
    networks:
      - pronolol-network
    # Scraper runs once and exits
    restart: "no"

  # ===============================
  # Uptime Kuma (Self-hosted monitoring)
  # ===============================
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - pronolol-network

  # ===============================
  # pgAdmin (DB Management)
  # ===============================
  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-me-in-production}
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pronolol-network

# ===============================
# Volumes
# ===============================
volumes:
  postgres_data:
    external: true
    name: pronolol_backend_postgres_data
  pgadmin_data:
    driver: local
  uptime_kuma_data:
    driver: local

# ===============================
# Networks
# ===============================
networks:
  pronolol-network:
    driver: bridge
