services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-pronolol}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      # Expose port 5432 to the host machine for local debugging.
      # You may want to remove this in a production environment for security.
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-user} -d $${POSTGRES_DB:-pronolol}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  scraper:
    build: ./scraper
    environment:
      PG_USER: ${POSTGRES_USER:-user}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-password}
      PG_DATABASE: ${POSTGRES_DB:-pronolol}
      PG_HOST: db
      PG_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
